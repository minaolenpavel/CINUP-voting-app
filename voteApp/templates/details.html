<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'voteApp/style.css' %}">
    <title>{{ question.question_text}}</title>
</head>
<body>
    <div class="bg"></div>
    <div id="topbar">
        <a href="{% url 'voteApp:index' %}">
            <img id="logo" src="{% static 'voteApp/img/android-chrome-512x512.png' %}">
        </a>
        <div id="toptxt">Assemblée générale du CINUP</div>
    </div>
    <div class="question-details">
        <h2>{{ question.question_text }}</h2>
        <p>{{ question.question_desc }}</p>
        <div class="choiceBox">
            {% for choice in question.choice_set.all %}
                <div class="oneChoice">
                    <h3>{{ choice.choice_text }}</h3>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
